<svg xmlns="http://www.w3.org/2000/svg" width="360" height="90" viewBox="0 0 360 90" role="img" aria-label="Logo BETALIS horizontal">
  <title>BETALIS — Ingénierie Structure (horizontal)</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;800&amp;display=swap');
      .wordmark { font-family: 'Manrope', 'Arial', sans-serif; font-weight: 800; }
      .tagline  { font-family: 'Manrope', 'Arial', sans-serif; font-weight: 400; }
    </style>
  </defs>

  <rect x="0" y="0" width="360" height="90" rx="12" fill="#1A1A2E"/>

  <!-- 3 points matériaux empilés à gauche -->
  <circle cx="42" cy="45" r="8" fill="#8A8D94"/>
  <circle cx="64" cy="45" r="8" fill="#B0703F"/>
  <circle cx="86" cy="45" r="8" fill="#5B8AAE"/>

  <!-- Séparateur vertical -->
  <line x1="110" y1="26" x2="110" y2="64" stroke="#FFFFFF" stroke-width="0.5" opacity="0.3"/>

  <!-- Texte -->
  <text x="128" y="44" class="wordmark" font-size="26" letter-spacing="4" fill="#FFFFFF">BETALIS</text>
  <text x="129" y="62" class="tagline" font-size="9" letter-spacing="4" fill="#B0B2C8">INGÉNIERIE STRUCTURE</text>
</svg>
