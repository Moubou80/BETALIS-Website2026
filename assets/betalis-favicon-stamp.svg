<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" role="img" aria-label="Logo BETALIS rond">
  <title>BETALIS — Ingénierie Structure (stamp)</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;800&amp;display=swap');
      .wordmark { font-family: 'Manrope', 'Arial', sans-serif; font-weight: 800; }
      .tagline  { font-family: 'Manrope', 'Arial', sans-serif; font-weight: 400; }
    </style>
  </defs>

  <circle cx="100" cy="100" r="100" fill="#1A1A2E"/>
  <circle cx="100" cy="100" r="93" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.2"/>

  <text x="100" y="92" text-anchor="middle" class="wordmark" font-size="24" letter-spacing="5" fill="#FFFFFF">BETALIS</text>
  <text x="100" y="112" text-anchor="middle" class="tagline" font-size="8" letter-spacing="4" fill="#B0B2C8">INGÉNIERIE</text>
  <text x="100" y="125" text-anchor="middle" class="tagline" font-size="8" letter-spacing="4" fill="#B0B2C8">STRUCTURE</text>

  <circle cx="76" cy="150" r="7" fill="#8A8D94"/>
  <circle cx="100" cy="150" r="7" fill="#B0703F"/>
  <circle cx="124" cy="150" r="7" fill="#5B8AAE"/>
