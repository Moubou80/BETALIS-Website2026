<svg xmlns="http://www.w3.org/2000/svg" width="320" height="200" viewBox="0 0 320 200" role="img" aria-label="Logo BETALIS — Ingénierie Structure (version claire)">
  <title>BETALIS — Ingénierie Structure (version claire)</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;800&amp;display=swap');
      .wordmark { font-family: 'Manrope', 'Arial', sans-serif; font-weight: 800; }
      .tagline  { font-family: 'Manrope', 'Arial', sans-serif; font-weight: 400; }
    </style>
  </defs>

  <!-- Pas de fond (transparent) -->

  <!-- Wordmark -->
  <text x="160" y="92" text-anchor="middle" class="wordmark"
        font-size="38" letter-spacing="7" fill="#1A1A2E">BETALIS</text>

  <!-- Ligne séparatrice -->
  <line x1="78" y1="110" x2="242" y2="110" stroke="#1A1A2E" stroke-width="0.5" opacity="0.2"/>

  <!-- Tagline -->
  <text x="161" y="134" text-anchor="middle" class="tagline"
        font-size="11" letter-spacing="6" fill="#555577">INGÉNIERIE STRUCTURE</text>

  <!-- 3 points matériaux -->
  <circle cx="128" cy="166" r="9" fill="#8A8D94"/>
  <circle cx="160" cy="166" r="9" fill="#B0703F"/>
  <circle cx="192" cy="166" r="9" fill="#5B8AAE"/>
</svg>
